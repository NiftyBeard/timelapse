name: Timelapse Snapshot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download snapshot
        run: |
          mkdir -p snapshots
          curl -L "https://cam.niftybeard.com/?action=snapshot" \
            --output "snapshots/$(date +'%Y-%m-%d_%H-%M-%S').jpg"

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add snapshots/*.jpg
          git commit -m "Snapshot $(date)" || echo "No changes"
          git push
