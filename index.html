<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NiftyBeard Cam Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --accent1: #703030;
    --accent2: #563516;
    --accent3: #38380e;
    --accent4: #1a3519;
    --accent5: #012f25;
    --accent6: #00262c;
    --accent7: #0c1d28;
    --accent8: #14141e;
    --accent9: #100a10;
    --black:   #000000;
  }

  body {
    margin: 0;
    font-family: "Roboto", sans-serif;
    background: var(--black);
    color: #e0e0e0;
  }

  header {
    padding: 24px;
    text-align: center;
    background: var(--accent8);
    color: #e8e8e8;
    font-size: 1.8rem;
    font-weight: 500;
    border-bottom: 1px solid var(--accent7);
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
  }

  .section {
    background: var(--accent9);
    padding: 20px;
    border-radius: 10px;
    border: 1px solid var(--accent7);
    margin-bottom: 40px;
  }

  .section h2 {
    margin-top: 0;
    font-weight: 400;
    color: var(--accent5);
    font-size: 1.4rem;
  }

  .live-stream {
    width: 100%;
    border-radius: 8px;
    border: 1px solid var(--accent6);
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
    margin-top: 20px;
  }

  .gallery-grid img {
    width: 100%;
    border-radius: 6px;
    border: 1px solid var(--accent7);
    transition: opacity 0.2s ease;
  }

  .gallery-grid img:hover {
    opacity: 0.8;
  }
</style>
</head>

<body>

<header>NiftyBeard Live Cam + Timelapse</header>

<div class="container">

  <section class="section">
    <h2>Live Stream</h2>
    <img class="live-stream" src="https://cam.niftybeard.com/?action=stream">
  </section>

  <section class="section">
    <h2>Timelapse Gallery</h2>
    <div id="gallery" class="gallery-grid"></div>
  </section>

</div>

<script>
const gallery = document.getElementById("gallery");

const owner = "NiftyBeard";
const repo = "timelapse";
const path = "snapshots";

fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`)
  .then(r => r.json())
  .then(files => {
    files.forEach(file => {
      if (file.name.endsWith(".jpg")) {
        const img = document.createElement("img");
        img.src = file.download_url;
        gallery.appendChild(img);
      }
    });
  });
</script>

</body>
</html>
