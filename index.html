<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NiftyBeard Cam Dashboard</title>

<style>
  :root {
    --green: #33691e;
    --teal: #3c9ea7;
    --lime: #91c02c;
    --black: #000000;
    --gold: #f0c418;
  }

  body {
    margin: 0;
    font-family: "Inter", sans-serif;
    background: var(--teal);
    color: white;
  }

  header {
    padding: 20px;
    text-align: center;
    background: linear-gradient(90deg, var(--lime), var(--gold));
    color: white;
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
  }

  .live-section {
    background: var(--lime);
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(240,196,24,0.2);
    margin-bottom: 40px;
  }

  .live-section h2 {
    margin-top: 0;
    color: var(--gold);
    font-size: 1.8rem;
  }

  .live-stream {
    width: 100%;
    border-radius: 12px;
    border: 3px solid var(--teal);
  }

  .gallery-section h2 {
    color: var(--black);
    font-size: 1.8rem;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 15px;
    margin-top: 20px;
  }

  .gallery-grid img {
    width: 100%;
    border-radius: 10px;
    border: 2px solid var(--green);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .gallery-grid img:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px var(--gold);
  }
</style>
</head>

<body>

<header>NiftyBeard Live Cam + Timelapse</header>

<div class="container">

  <!-- LIVE STREAM -->
  <section class="live-section">
    <h2>Live Stream</h2>
    <img class="live-stream" src="https://cam.niftybeard.com/?action=stream">
  </section>

  <!-- TIMELAPSE GALLERY -->
  <section class="gallery-section">
    <h2>Timelapse Gallery</h2>
    <div id="gallery" class="gallery-grid"></div>
  </section>

</div>

<script>
const gallery = document.getElementById("gallery");

// Replace with your repo info
const owner = "NiftyBeard";
const repo = "timelapse";
const path = "snapshots";

fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`)
  .then(r => r.json())
  .then(files => {
    files.forEach(file => {
      if (file.name.endsWith(".jpg")) {
        const img = document.createElement("img");
        img.src = file.download_url;
        gallery.appendChild(img);
      }
    });
  });
</script>


</body>
</html>
